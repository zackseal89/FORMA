<svg viewBox="0 0 248 115" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>FORMA logo — dark</title>
  <desc>FORMA wordmark with terracotta S-curve mark and NAIROBI label. For use on dark (#131312) surfaces.</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400&amp;family=DM+Sans:wght@600&amp;display=swap');
    </style>
  </defs>

  <!-- S-curve mark: terracotta, suggests form/silhouette -->
  <path
    d="M 22 8 C 40 26, 4 42, 22 55 C 4 68, 40 84, 22 102"
    fill="none"
    stroke="#ffb693"
    stroke-width="1.8"
    stroke-linecap="round"/>

  <!-- Hairline separator -->
  <line x1="42" y1="28" x2="42" y2="82" stroke="#e5e2de" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- FORMA wordmark: EB Garamond 400, warm bone -->
  <text
    x="54"
    y="73"
    font-family="'EB Garamond', Georgia, 'Times New Roman', serif"
    font-size="48"
    font-weight="400"
    letter-spacing="5"
    fill="#e5e2de">FORMA</text>

  <!-- NAIROBI label: labelCaps — DM Sans 600, warm taupe, 0.1em tracking -->
  <text
    x="56"
    y="92"
    font-family="'DM Sans', system-ui, Helvetica, sans-serif"
    font-size="10"
    font-weight="600"
    letter-spacing="1"
    fill="#a48c81">NAIROBI</text>
</svg>
